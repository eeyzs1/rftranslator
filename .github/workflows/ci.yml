name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: dart analyze --no-fatal-warnings 2>&1 | tee analyze-output.txt
        continue-on-error: true
      - name: Check for errors
        run: |
          if grep -q "error •" analyze-output.txt; then
            echo "Found errors in analysis:"
            grep "error •" analyze-output.txt
            exit 1
          fi
      - run: flutter test --reporter=github

  build-windows-check:
    name: Build Windows (Check)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - run: flutter pub get
      - run: flutter build windows --debug
      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "build\windows\x64\runner\Debug\rftranslator.exe"
          if (Test-Path $exe) {
            Write-Host "Build succeeded: $(Get-Item $exe).FullName ($([math]::Round((Get-Item $exe).Length / 1MB, 2)) MB)"
          } else {
            Write-Error "Build failed: $exe not found"
            exit 1
          }
