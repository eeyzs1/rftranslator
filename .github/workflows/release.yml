name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installerUrl = "https://jrsoftware.org/download.php/is.exe"
          $installerPath = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Write-Host "Downloading Inno Setup from $installerUrl..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -MaximumRetryCount 3
          Write-Host "Installing Inno Setup..."
          Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT","/NORESTART","/SUPPRESSMSGBOXES","/SP-" -Wait
          Write-Host "Inno Setup installed."
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            Write-Host "ISCC.exe found at: $isccPath"
          } else {
            Write-Error "ISCC.exe not found at expected path!"
            Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "Inno*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found dir: $($_.FullName)" }
            exit 1
          }

      - name: Prepare Inno Setup script
        id: iss
        shell: pwsh
        run: |
          $appVer = "${{ steps.prep.outputs.VERSION }}".Trim()
          $srcDir = "${{ steps.prep.outputs.BUILD_DIR }}".Trim()
          $outputDir = "${{ github.workspace }}\tools\installer\output"
          $issPath = "${{ github.workspace }}\tools\installer\rftranslator.iss"

          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $content = Get-Content $issPath -Raw -Encoding UTF8
          $content = $content.Replace('  #define AppVersion "0.0.0"', "  #define AppVersion `"$appVer`"")
          $content = $content.Replace('  #define SourceDir ".\build"', "  #define SourceDir `"$srcDir`"")
          $content = $content.Replace('  #define OutputDir ".\output"', "  #define OutputDir `"$outputDir`"")

          $modifiedPath = Join-Path $env:RUNNER_TEMP "rftranslator_build.iss"
          [System.IO.File]::WriteAllText($modifiedPath, $content, (New-Object System.Text.UTF8Encoding $false))

          Write-Host "Modified ISS file created at: $modifiedPath"
          Write-Host "Content preview (first 20 lines):"
          Get-Content $modifiedPath -TotalCount 20 | Write-Host
          echo "ISS_PATH=$modifiedPath" >> $env:GITHUB_OUTPUT

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $issPath = "${{ steps.iss.outputs.ISS_PATH }}"
          Write-Host "Running ISCC..."
          Write-Host "  ISCC: $isccPath"
          Write-Host "  ISS:  $issPath"
          & $isccPath $issPath

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
