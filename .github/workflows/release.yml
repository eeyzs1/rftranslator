name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if ($iscc) {
            Write-Host "Inno Setup already installed at: $($iscc.Source)"
          } else {
            choco install innosetup -y
          }

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          set APP_VER=${{ steps.prep.outputs.VERSION }}
          set SRC_DIR=${{ steps.prep.outputs.BUILD_DIR }}
          set ISS_PATH=${{ github.workspace }}\tools\installer\rftranslator.iss
          set OUTPUT_DIR=${{ github.workspace }}\tools\installer\output
          
          echo Creating output directory...
          if not exist "%OUTPUT_DIR%" mkdir "%OUTPUT_DIR%"
          
          echo AppVersion=%APP_VER%
          echo SourceDir=%SRC_DIR%
          echo OutputDir=%OUTPUT_DIR%
          echo ISS_PATH=%ISS_PATH%
          
          echo Running ISCC...
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=%APP_VER% /DSourceDir="%SRC_DIR%" /DOutputDir="%OUTPUT_DIR%" "%ISS_PATH%"
          
          echo Checking installer output...
          dir "%OUTPUT_DIR%"
          
          if not exist "%OUTPUT_DIR%\rftranslator-%APP_VER%-setup.exe" (
            echo ERROR: Installer not found!
            exit /b 1
          )
          echo Installer created successfully!

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
