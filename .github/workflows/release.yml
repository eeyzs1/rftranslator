name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if ($iscc) {
            Write-Host "Inno Setup already installed at: $($iscc.Source)"
          } else {
            choco install innosetup -y
          }

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $appVer = "${{ steps.prep.outputs.VERSION }}".Trim()
          $srcDir = "${{ steps.prep.outputs.BUILD_DIR }}".Trim()
          $issPath = "${{ github.workspace }}\tools\installer\rftranslator.iss"
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found"
            exit 1
          }
          Write-Host "ISCC: $iscc"
          Write-Host "AppVersion: $appVer"
          Write-Host "SourceDir: $srcDir"
          $wrapperPath = Join-Path $env:RUNNER_TEMP "build_installer.iss"
          $outputDir = Join-Path $env:RUNNER_TEMP "installer_output"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          "#define AppVersion `"$appVer`"" | Set-Content -Path $wrapperPath -Encoding UTF8
          "#define SourceDir `"$srcDir`"" | Add-Content -Path $wrapperPath -Encoding UTF8
          "#define OutputDir `"$outputDir`"" | Add-Content -Path $wrapperPath -Encoding UTF8
          "#include `"$issPath`"" | Add-Content -Path $wrapperPath -Encoding UTF8
          Write-Host "Wrapper ISS created at: $wrapperPath"
          Get-Content $wrapperPath | Write-Host
          & $iscc $wrapperPath
          $installerName = "rftranslator-$appVer-setup.exe"
          $installerPath = Join-Path $outputDir $installerName
          Write-Host "Expected installer path: $installerPath"
          if (Test-Path $installerPath) {
            $destPath = Join-Path "${{ github.workspace }}" "tools\installer\output"
            New-Item -ItemType Directory -Path $destPath -Force | Out-Null
            Copy-Item $installerPath $destPath
            Write-Host "Installer copied to: $destPath\$installerName"
          } else {
            Write-Error "Installer not found at: $installerPath"
            Get-ChildItem $outputDir -ErrorAction SilentlyContinue | Write-Host
            exit 1
          }

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
