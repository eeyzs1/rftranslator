name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Write-Host "Searching for ISCC.exe..."
          Get-ChildItem "C:\Program Files (x86)\Inno Setup*" -Recurse -Filter "ISCC.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          Get-Command ISCC.exe -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "On PATH: $($_.Source)" }

      - name: Build Inno Setup installer
        id: inno
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appVer = "${{ steps.prep.outputs.VERSION }}".Trim()
          $srcDir = "${{ steps.prep.outputs.BUILD_DIR }}".Trim()
          $issPath = "${{ github.workspace }}\tools\installer\rftranslator.iss"
          $outputDir = "${{ github.workspace }}\tools\installer\output"
          
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          
          $isccExe = $null
          $searchPaths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "C:\Program Files (x86)\Inno Setup 5\ISCC.exe"
          )
          foreach ($p in $searchPaths) {
            if (Test-Path $p) {
              $isccExe = $p
              break
            }
          }
          if (-not $isccExe) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) { $isccExe = $cmd.Source }
          }
          if (-not $isccExe) {
            $found = Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $isccExe = $found.FullName }
          }
          if (-not $isccExe) {
            Write-Warning "ISCC.exe not found, skipping installer build"
            exit 0
          }
          
          Write-Host "ISCC: $isccExe"
          Write-Host "AppVersion: $appVer"
          Write-Host "SourceDir: $srcDir"
          Write-Host "OutputDir: $outputDir"
          Write-Host "ISS Path: $issPath"
          
          if (-not (Test-Path $issPath)) {
            Write-Error "ISS file not found: $issPath"
            exit 1
          }
          
          $wrapperPath = Join-Path $env:RUNNER_TEMP "build_installer.iss"
          $line1 = "#define AppVersion `"$appVer`""
          $line2 = "#define SourceDir `"$srcDir`""
          $line3 = "#define OutputDir `"$outputDir`""
          $line4 = "#include `"$issPath`""
          [System.IO.File]::WriteAllLines($wrapperPath, @($line1, $line2, $line3, $line4), (New-Object System.Text.UTF8Encoding $false))
          
          Write-Host "Wrapper ISS content:"
          Get-Content $wrapperPath | Write-Host
          
          Write-Host "Running ISCC..."
          & $isccExe $wrapperPath 2>&1 | Write-Host
          
          $installerName = "rftranslator-$appVer-setup.exe"
          $installerPath = Join-Path $outputDir $installerName
          if (Test-Path $installerPath) {
            Write-Host "Installer created: $installerPath"
            echo "INSTALLER_PATH=$installerPath" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "Installer not found at: $installerPath"
            Get-ChildItem $outputDir -ErrorAction SilentlyContinue | Write-Host
          }

      - name: Upload Installer to Release
        if: steps.inno.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
