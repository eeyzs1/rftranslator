name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installerUrl = "https://jrsoftware.org/download.php/is.exe"
          $installerPath = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Write-Host "Downloading Inno Setup from $installerUrl..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -MaximumRetryCount 3
          Write-Host "Downloaded. Size: $((Get-Item $installerPath).Length) bytes"
          Write-Host "Installing Inno Setup silently..."
          $proc = Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT","/NORESTART","/SUPPRESSMSGBOXES","/SP-","/LOG" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0) {
            Write-Error "Inno Setup installer failed with exit code $($proc.ExitCode)"
            exit 1
          }
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $isccPath)) {
            Write-Error "ISCC.exe not found at $isccPath"
            Get-ChildItem "C:\Program Files (x86)" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Dir: $($_.FullName)" }
            exit 1
          }
          Write-Host "ISCC.exe found at $isccPath"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $appVer = "${{ steps.prep.outputs.VERSION }}"
          $srcDir = "${{ steps.prep.outputs.BUILD_DIR }}"
          $outputDir = "${{ github.workspace }}\tools\installer\output"
          $issPath = "${{ github.workspace }}\tools\installer\rftranslator.iss"
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          Write-Host "AppVersion: $appVer"
          Write-Host "SourceDir:  $srcDir"
          Write-Host "OutputDir:  $outputDir"
          Write-Host "ISS file:   $issPath"
          Write-Host "ISCC path:  $isccPath"

          if (-not (Test-Path $srcDir)) {
            Write-Error "Source directory does not exist: $srcDir"
            exit 1
          }
          Write-Host "Source directory exists. Contents:"
          Get-ChildItem $srcDir | Select-Object -First 10 | ForEach-Object { Write-Host "  $($_.Name)" }

          if (-not (Test-Path $issPath)) {
            Write-Error "ISS file does not exist: $issPath"
            exit 1
          }

          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $batContent = @"
          @echo off
          "$isccPath" /DAppVersion=$appVer /DSourceDir="$srcDir" /DOutputDir="$outputDir" "$issPath"
          exit /b %ERRORLEVEL%
          "@
          $batPath = Join-Path $env:RUNNER_TEMP "run_iscc.bat"
          Set-Content -Path $batPath -Value $batContent.Trim() -Encoding ASCII

          Write-Host "Batch file content:"
          Get-Content $batPath | ForEach-Object { Write-Host $_ }

          Write-Host "Running ISCC via batch file..."
          $proc = Start-Process -FilePath "cmd.exe" -ArgumentList "/c", "`"$batPath`"" -Wait -PassThru -NoNewWindow -RedirectStandardOutput (Join-Path $env:RUNNER_TEMP "iscc_stdout.txt") -RedirectStandardError (Join-Path $env:RUNNER_TEMP "iscc_stderr.txt")

          $stdout = Get-Content (Join-Path $env:RUNNER_TEMP "iscc_stdout.txt") -ErrorAction SilentlyContinue
          $stderr = Get-Content (Join-Path $env:RUNNER_TEMP "iscc_stderr.txt") -ErrorAction SilentlyContinue

          if ($stdout) { Write-Host "ISCC stdout:"; $stdout | ForEach-Object { Write-Host $_ } }
          if ($stderr) { Write-Host "ISCC stderr:"; $stderr | ForEach-Object { Write-Host $_ } }

          Write-Host "ISCC exit code: $($proc.ExitCode)"

          if ($proc.ExitCode -ne 0) {
            Write-Error "ISCC failed with exit code $($proc.ExitCode)"
            exit 1
          }

          $installerName = "rftranslator-$appVer-setup.exe"
          $installerPath = Join-Path $outputDir $installerName
          if (Test-Path $installerPath) {
            Write-Host "SUCCESS: Installer created at $installerPath"
            Write-Host "Size: $((Get-Item $installerPath).Length) bytes"
          } else {
            Write-Error "Installer not found at $installerPath"
            Write-Host "Output directory contents:"
            Get-ChildItem $outputDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
