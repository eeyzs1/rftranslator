name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installerUrl = "https://jrsoftware.org/download.php/is.exe"
          $installerPath = "$env:TEMP\is.exe"
          Write-Host "Downloading Inno Setup..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Write-Host "Installing Inno Setup..."
          Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT /NORESTART /SP-" -Wait
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $isccPath) {
            Write-Host "Inno Setup installed successfully at: $isccPath"
          } else {
            Write-Host "ERROR: ISCC.exe not found at expected path"
            Get-ChildItem "C:\Program Files (x86)\Inno Setup 6" -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          $version = "${{ steps.prep.outputs.VERSION }}"
          $sourceDir = "${{ steps.prep.outputs.BUILD_DIR }}"
          $outputDir = "${{ github.workspace }}\tools\installer\output"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $templatePath = "${{ github.workspace }}\tools\installer\rftranslator.iss"
          $issPath = "${{ github.workspace }}\tools\installer\build.iss"

          $content = Get-Content -Path $templatePath -Raw
          $content = $content.Replace('__VERSION__', $version)
          $content = $content.Replace('__SOURCEDIR__', $sourceDir)
          $content = $content.Replace('__OUTPUTDIR__', $outputDir)
          [System.IO.File]::WriteAllText($issPath, $content, [System.Text.UTF8Encoding]::new($false))

          Write-Host "Generated ISS file at: $issPath"
          Write-Host "SourceDir: $sourceDir"
          Write-Host "OutputDir: $outputDir"
          Write-Host "AppVersion: $version"
          Write-Host "ISS file content:"
          Get-Content $issPath | ForEach-Object { Write-Host $_ }

          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Write-Host "Running ISCC..."
          & $isccPath $issPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: ISCC failed with exit code: $LASTEXITCODE"
            exit 1
          }
          Write-Host "ISCC completed successfully"

          $setupExe = Join-Path $outputDir "rftranslator-$version-setup.exe"
          if (Test-Path $setupExe) {
            Write-Host "Installer created successfully: $setupExe"
            $fileSize = (Get-Item $setupExe).Length / 1MB
            Write-Host "Installer size: $([math]::Round($fileSize, 2)) MB"
          } else {
            Write-Host "ERROR: Installer not found at expected path: $setupExe"
            Get-ChildItem $outputDir -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
