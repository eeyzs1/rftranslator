name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Prepare artifact paths
        id: prep
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $baseName = "rftranslator-$tag"
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
          echo "BASE_NAME=$baseName" >> $env:GITHUB_OUTPUT
          echo "BUILD_DIR=$buildDir" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.prep.outputs.BUILD_DIR }}\*" -DestinationPath "${{ steps.prep.outputs.BASE_NAME }}.zip" -CompressionLevel Optimal

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $appVer = "${{ steps.prep.outputs.VERSION }}".Trim()
          $srcDir = "${{ steps.prep.outputs.BUILD_DIR }}".Trim()
          $issPath = "${{ github.workspace }}\tools\installer\rftranslator.iss"
          $outputDir = "${{ github.workspace }}\tools\installer\output"
          
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          
          $isccPath = Get-ChildItem "C:\Program Files (x86)\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $isccPath) {
            $isccPath = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          }
          if (-not $isccPath) {
            Write-Error "ISCC.exe not found!"
            exit 1
          }
          
          Write-Host "ISCC: $($isccPath.FullName)"
          Write-Host "AppVersion: $appVer"
          Write-Host "SourceDir: $srcDir"
          Write-Host "OutputDir: $outputDir"
          
          $wrapperPath = Join-Path $env:RUNNER_TEMP "build_installer.iss"
          $lines = @(
            "#define AppVersion `"$appVer`"",
            "#define SourceDir `"$srcDir`"",
            "#define OutputDir `"$outputDir`"",
            "#include `"$issPath`""
          )
          [System.IO.File]::WriteAllLines($wrapperPath, $lines, [System.Text.Encoding]::UTF8)
          
          Write-Host "Wrapper ISS content:"
          Get-Content $wrapperPath | ForEach-Object { Write-Host $_ }
          
          & $isccPath.FullName $wrapperPath
          
          $installerName = "rftranslator-$appVer-setup.exe"
          $installerPath = Join-Path $outputDir $installerName
          if (Test-Path $installerPath) {
            Write-Host "Installer created: $installerPath"
          } else {
            Write-Error "Installer not found at: $installerPath"
            exit 1
          }

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.prep.outputs.BASE_NAME }}.zip
          generate_release_notes: true

      - name: Upload Installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: tools/installer/output/rftranslator-${{ steps.prep.outputs.VERSION }}-setup.exe
